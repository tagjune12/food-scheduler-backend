# 서버 포트 설정
server.port=8080

# Supabase PostgreSQL 데이터베이스 설정
spring.datasource.url=jdbc:postgresql://${SUPABASE_HOST}:${SUPABASE_PORT}/${SUPABASE_DB}?user=${SUPABASE_USER}&password=${SUPABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Supabase 설정
supabase.url=${SUPABASE_URL}
supabase.key=${SUPABASE_KEY}

# JPA 설정
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 카카오맵 API 설정
kakao.api.key=${KAKAO_API_KEY}
kakao.api.url=https://dapi.kakao.com/v2/local/search/category.json

# 지도 중심 좌표 및 검색 반경 설정
longitude=127.1115201
latitude=37.4028207
radius=1500




