# 서버 포트 설정
server.port=8080

# Supabase PostgreSQL 데이터베이스 설정
spring.datasource.url=jdbc:postgresql://${SUPABASE_HOST}:${SUPABASE_PORT}/${SUPABASE_DB}?prepareThreshold=0&socketTimeout=60
spring.datasource.username=${SUPABASE_USER}
spring.datasource.password=${SUPABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP 커넥션 풀 설정
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.max-lifetime=580000

# Supabase 설정
supabase.url=${SUPABASE_URL}
supabase.key=${SUPABASE_KEY}

# MyBatis 설정
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl

# 카카오맵 API 설정
kakao.api.key=${KAKAO_API_KEY}

# 로깅 설정
logging.level.root=INFO
logging.level.com.foodscheduler=DEBUG
logging.file.name=logs/application.log
logging.file.path=logs
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n




