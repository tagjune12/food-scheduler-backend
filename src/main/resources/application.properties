# 서버 포트 설정
server.port=8080

# Supabase PostgreSQL 데이터베이스 설정
spring.datasource.url=jdbc:postgresql://${SUPABASE_HOST}:${SUPABASE_PORT}/${SUPABASE_DB}?prepareThreshold=0
spring.datasource.username=${SUPABASE_USER}
spring.datasource.password=${SUPABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Supabase 설정
supabase.url=${SUPABASE_URL}
supabase.key=${SUPABASE_KEY}

# JPA 설정
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 카카오맵 API 설정
kakao.api.key=${KAKAO_API_KEY}

# 로깅 설정
logging.level.root=INFO
logging.level.com.foodscheduler=DEBUG
logging.file.name=logs/application.log
logging.file.path=logs
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n




